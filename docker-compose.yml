# Docker Compose para proyecto MARIA
# Configuración completa para desarrollo y producción

version: "3.8"

services:
  # Aplicación principal MARIA
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: maria_app
    ports:
      - "8080:8080"
    environment:
      # Base de datos
      - DATABASE_URL=postgresql+asyncpg://maria_user:maria_pass@postgres:5432/maria_db
      - ENABLE_DATABASE=true

      # Redis
      - REDIS_URL=redis://redis:6379/0
      - ENABLE_REDIS=true

      # Gemini API
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=gemini-3.1-flash-lite-preview

      # Logging
      - ENABLE_REQUEST_LOGGING=true
      - LOG_LEVEL=INFO

      # Servidor
      - UVICORN_HOST=0.0.0.0
      - PORT=8080
      - MAX_UPLOAD_MB=10

      # Rate limiting
      - RATE_LIMIT=120/minute

      # NCM cache
      - NCM_CACHE_TTL=86400
      - NCM_CACHE_MAX=5000
      - FUZZY_THRESHOLD=65
      - NCM_TOPK_MAX=3
      - NCM_TOPK_GAP=15

      # LLM fallback
      - ENABLE_LLM_FALLBACK=true

      # CORS
      - ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000

      # Seguridad
      - ENVIRONMENT=production
      - ENABLE_HSTS=false
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-default-secret-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
    restart: unless-stopped
    networks:
      - maria_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Base de datos PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: maria_postgres
    environment:
      - POSTGRES_DB=maria_db
      - POSTGRES_USER=maria_user
      - POSTGRES_PASSWORD=maria_pass
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./proyecto_maria/database/db_init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./add_indexes.sql:/docker-entrypoint-initdb.d/02-indexes.sql:ro
    restart: unless-stopped
    networks:
      - maria_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maria_user -d maria_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: maria_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - maria_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Nginx reverse proxy (opcional para producción)
  nginx:
    image: nginx:alpine
    container_name: maria_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - maria_network
    profiles:
      - production

  # Monitoring con Prometheus (opcional)
  prometheus:
    image: prom/prometheus:latest
    container_name: maria_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--storage.tsdb.retention.time=200h"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    networks:
      - maria_network
    profiles:
      - monitoring

  # Grafana dashboard (opcional)
  grafana:
    image: grafana/grafana:latest
    container_name: maria_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - maria_network
    profiles:
      - monitoring

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  maria_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
