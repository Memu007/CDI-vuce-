name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Dependencias del sistema
        run: sudo apt-get update && sudo apt-get install -y libmagic1

      - name: Dependencias Python
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Sintaxis Python
        run: python -m compileall -q proyecto_maria tests

      - name: Pruebas críticas estables
        env:
          ENVIRONMENT: testing
          JWT_SECRET_KEY: ci-only-key-material-with-more-than-32-characters
          EMAIL_VERIFICATION_REQUIRED: "false"
        run: >-
          python -m pytest --no-cov
          tests/test_generar_maria_txt.py
          tests/test_regression_phase0.py
          tests/test_migration_import.py
          tests/test_smart_validation_gates.py

  e2e-maria:
    needs: tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: config/package-lock.json

      - name: Caché de Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('config/package-lock.json') }}

      - name: Dependencias del sistema
        run: sudo apt-get update && sudo apt-get install -y libmagic1 libnss3 libgbm1 libxss1

      - name: Dependencias Python
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Dependencias del E2E
        run: npm ci --prefix config

      - name: E2E MARIA aislado
        env:
          E2E_ARTIFACTS: ${{ runner.temp }}/cdi-e2e-maria-artifacts
        run: ./scripts/testing/e2e_maria.sh

      - name: Evidencia de fallo E2E
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-maria-failure
          path: ${{ runner.temp }}/cdi-e2e-maria-artifacts
          if-no-files-found: ignore
