[pytest]
testpaths = tests
asyncio_mode = auto
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
    --timeout=120
    --timeout-method=thread
    --cov=proyecto_maria.main
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=38
    --ignore=tests/old/
markers =
    unit: Unit tests
    integration: Integration tests
    security: Security tests
    api: API endpoint tests
    slow: Slow running tests
    asyncio: Async tests
