<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Restablecer contraseña · CDI</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --card: #ffffff;
      --text: #1d1d1f;
      --muted: #6e6e73;
      --border: #d2d2d7;
      --accent: #0071e3;
      --accent-hover: #0077ed;
      --error: #d70015;
      --success: #248a3d;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.06);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .subtitle {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }
    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      font-size: 15px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      transition: border-color 0.15s;
    }
    input[type="password"]:focus {
      outline: none;
      border-color: var(--accent);
    }
    .field { margin-bottom: 16px; }
    button {
      width: 100%;
      padding: 11px 16px;
      font-size: 15px;
      font-weight: 500;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover:not(:disabled) { background: var(--accent-hover); }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .msg {
      margin-top: 16px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.4;
      display: none;
    }
    .msg.error { display: block; background: #ffeef0; color: var(--error); }
    .msg.success { display: block; background: #e8f7ed; color: var(--success); }
    .footer-link {
      margin-top: 20px;
      text-align: center;
      font-size: 13px;
    }
    .footer-link a {
      color: var(--accent);
      text-decoration: none;
    }
    .footer-link a:hover { text-decoration: underline; }
    .hint {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Restablecer contraseña</h1>
    <p class="subtitle">Ingresá tu nueva contraseña. El link del email es válido por una hora.</p>

    <form id="resetForm" autocomplete="off">
      <div class="field">
        <label for="password">Nueva contraseña</label>
        <input type="password" id="password" required minlength="8" autocomplete="new-password" />
        <div class="hint">Mínimo 8 caracteres.</div>
      </div>
      <div class="field">
        <label for="confirm">Repetir contraseña</label>
        <input type="password" id="confirm" required minlength="8" autocomplete="new-password" />
      </div>
      <button type="submit" id="submitBtn">Guardar nueva contraseña</button>
    </form>

    <div id="msg" class="msg" role="status" aria-live="polite"></div>

    <p class="footer-link"><a href="/">Volver al inicio</a></p>
  </div>

  <script>
    (function () {
      const qs = new URLSearchParams(window.location.search);
      const token = qs.get("token") || qs.get("reset_token") || "";
      const form = document.getElementById("resetForm");
      const msg = document.getElementById("msg");
      const btn = document.getElementById("submitBtn");

      function showError(text) {
        msg.className = "msg error";
        msg.textContent = text;
      }
      function showSuccess(text) {
        msg.className = "msg success";
        msg.textContent = text;
      }

      if (!token) {
        showError("El link no contiene un token válido. Pedí uno nuevo desde la pantalla de login.");
        btn.disabled = true;
        return;
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        msg.className = "msg";
        msg.textContent = "";

        const pwd = document.getElementById("password").value;
        const confirm = document.getElementById("confirm").value;

        if (pwd.length < 8) {
          showError("La contraseña debe tener al menos 8 caracteres.");
          return;
        }
        if (pwd !== confirm) {
          showError("Las contraseñas no coinciden.");
          return;
        }

        btn.disabled = true;
        btn.textContent = "Guardando...";

        try {
          const r = await fetch("/auth/reset-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token, new_password: pwd }),
          });
          const data = await r.json().catch(() => ({}));
          if (!r.ok) {
            showError(data.detail || "No se pudo restablecer la contraseña. El link puede haber expirado.");
            btn.disabled = false;
            btn.textContent = "Guardar nueva contraseña";
            return;
          }
          showSuccess("Contraseña actualizada. Redirigiendo al login...");
          btn.textContent = "OK";
          setTimeout(() => {
            window.location.href = "/?login=1";
          }, 1500);
        } catch (err) {
          showError("Error de red. Reintentá en unos segundos.");
          btn.disabled = false;
          btn.textContent = "Guardar nueva contraseña";
        }
      });
    })();
  </script>
</body>
</html>
