version: '3.9'
services:
  db:
    image: postgres:15-alpine
    container_name: caca_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: caca
      POSTGRES_USER: caca_user
      POSTGRES_PASSWORD: caca_pass
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./backups:/backups
    command: ["postgres", "-c", "shared_buffers=256MB", "-c", "max_connections=200"]


